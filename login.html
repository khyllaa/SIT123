<section id="login" class="page">
    <div class="login-card">
        <span class="back-btn" onclick="showPage('home')"><i class="fas fa-chevron-left"></i> BACK</span>
        <h2>LOGIN</h2>
        
        <div class="input-group">
            <i class="fas fa-user icon-input"></i>
            <input type="email" id="emailInput" placeholder="ENTER EMAIL">
        </div>
        <div class="input-group">
            <i class="fas fa-eye-slash icon-input"></i>
            <input type="password" id="passInput" placeholder="PASSWORD">
        </div>
        
        <button class="btn-blue-submit full-width" onclick="validateGmail()">LOGIN</button>
        
        <div class="divider"><span>Sign in with</span></div>
        <div class="social-icons">
            <button class="social-btn facebook" onclick="alert('Login Facebook Berhasil')"><i class="fab fa-facebook-f"></i></button>
            <button class="social-btn google" onclick="alert('Login Google Berhasil')"><i class="fab fa-google"></i></button>
            <button class="social-btn apple" onclick="alert('Login Apple Berhasil')"><i class="fab fa-apple"></i></button>
        </div>
    </div>
</section>
